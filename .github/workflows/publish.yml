name: Publish release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: Select the release type
        required: true
        options:
          - patch
          - minor
      version:
        type: string
        description: Exact version to publish (optional, for example 3.19.0-lite)
        required: false

permissions:
  contents: write

jobs:
  release-configuration:
    name: Resolve release configuration
    runs-on: ubuntu-latest
    outputs:
      macos-signing-enabled: ${{ steps.flags.outputs.macos_signing_enabled }}

    steps:
      - name: Detect optional macOS signing credentials
        id: flags
        env:
          APPLE_APPLICATION_CERTIFICATE: ${{ secrets.APPLE_APPLICATION_CERTIFICATE }}
          APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -n "$APPLE_APPLICATION_CERTIFICATE" ] && [ -n "$APPLE_P12_PASSWORD" ] && [ -n "$KEYCHAIN_PASSWORD" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "macos_signing_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "macos_signing_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  reset-release:
    name: Remove existing release for current tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Delete existing GitHub release for the current tag
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                ...context.repo,
                release_id: release.id,
              });
              core.info(`Deleted existing release for tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}.`);
                return;
              }

              throw error;
            }

  build-macos:
    name: Build macOS
    if: needs.release-configuration.outputs.macos-signing-enabled == 'true'
    needs: [release-configuration, reset-release]
    runs-on: macos-latest

    steps:
      - name: Install Apple certificate
        if: needs.release-configuration.outputs.macos-signing-enabled == 'true'
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_APPLICATION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install required tools
        run: brew install python-setuptools

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Create new version
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version "${{ github.event.inputs.version }}" -m "chore: v%s"
          else
            npm version "${{ github.event.inputs.release-type }}" -m "chore: v%s"
          fi

      - name: Package and publish macOS artifacts
        run: |
          npm install
          npm run build
          npm run package -- --mac
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: |
            dist/*.dmg
            dist/*.zip

  build-linux:
    name: Build Linux
    needs: [release-configuration, reset-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Create new version
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version "${{ github.event.inputs.version }}" -m "chore: v%s"
          else
            npm version "${{ github.event.inputs.release-type }}" -m "chore: v%s"
          fi

      - name: Package Linux artifacts
        run: |
          npm install
          npm run build
          npm run package -- --linux
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  build-windows:
    name: Build Windows installer and portable
    needs: [release-configuration, reset-release]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Create new version
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version "${{ github.event.inputs.version }}" -m "chore: v%s"
          else
            npm version "${{ github.event.inputs.release-type }}" -m "chore: v%s"
          fi

      - name: Package Windows artifacts
        run: |
          npm install
          npm run build
          npm run package -- --win nsis portable
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            dist/*.exe

  publish-release:
    name: Publish GitHub release
    if: >
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success' &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub release and upload assets
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated release for $GITHUB_REF_NAME."
        env:
          GH_TOKEN: ${{ github.token }}

  publish-on-github:
    name: Push version bump and tag
    if: github.event_name == 'workflow_dispatch'
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Create new version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -n "${{ github.event.inputs.version }}" ]; then
            npm version "${{ github.event.inputs.version }}" -m "chore: v%s"
          else
            npm version "${{ github.event.inputs.release-type }}" -m "chore: v%s"
          fi

      - name: Push the version bump and tags
        run: git push origin HEAD:main --follow-tags
