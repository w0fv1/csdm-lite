name: Download translations from Crowdin

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-crowdin-configuration:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Check Crowdin secrets
        id: check
        env:
          CROWDIN_GH_TOKEN: ${{ secrets.CROWDIN_GH_TOKEN }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          if [ -n "$CROWDIN_GH_TOKEN" ] && [ -n "$CROWDIN_PERSONAL_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  download-translations-from-crowdin:
    needs: check-crowdin-configuration
    if: needs.check-crowdin-configuration.outputs.enabled == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1 # Should be 1 to avoid parallel builds
      matrix:
        lc: [es-ES, fr, pt-BR, zh-CN, zh-TW, de]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          create_pull_request: true
          localization_branch_name: l10n_crowdin_download_translations_${{ matrix.lc }}
          pull_request_title: 'feat: update translations - ${{ matrix.lc }}'
          pull_request_labels: 'i18n'
          pull_request_base_branch_name: 'main'
          commit_message: |
            feat: update translations - ${{ matrix.lc }}

            [skip ci]
          download_language: ${{ matrix.lc }}
        env:
          GITHUB_TOKEN: ${{ secrets.CROWDIN_GH_TOKEN }}
          CROWDIN_PROJECT_ID: '631068'
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  crowdin-not-configured:
    needs: check-crowdin-configuration
    if: needs.check-crowdin-configuration.outputs.enabled != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Skip optional Crowdin download
        run: echo "Crowdin secrets are not configured. Skipping translation download."
